name: Daily AI Brief to WeChat

on:
  schedule:
    # 09:00 Asia/Bangkok = 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  send-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate and push brief
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          LOOKBACK_HOURS: "72"
          TZ: Asia/Bangkok
        run: python scripts/daily_ai_brief.py
