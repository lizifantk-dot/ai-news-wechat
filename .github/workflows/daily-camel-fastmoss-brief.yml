name: Daily CAMEL FastMoss Brief

on:
  schedule:
    # Primary: 09:47 Asia/Bangkok = 02:47 UTC
    - cron: "47 2 * * *"
    # Backups: GitHub scheduled runs can occasionally be delayed or skipped.
    # The script deduplicates scheduled pushes per Bangkok date.
    - cron: "57 2 * * *"
    - cron: "7 3 * * *"
  workflow_dispatch:
    inputs:
      force_send:
        description: "Force send even if today's report was already pushed"
        required: false
        default: "false"

jobs:
  send-camel-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch EchoTik data
        env:
          ECHOTIK_AUTH_TOKEN: ${{ secrets.ECHOTIK_AUTH_TOKEN }}
          TZ: Asia/Bangkok
        run: python scripts/echotik_fetch.py || echo "EchoTik fetch failed; continue with FastMoss report."

      - name: Generate FastMoss report and push
        env:
          FASTMOSS_COOKIE: ${{ secrets.FASTMOSS_COOKIE }}
          SERVERCHAN_BOSS_SENDKEY: ${{ secrets.SERVERCHAN_BOSS_SENDKEY }}
          FORCE_SEND: ${{ github.event.inputs.force_send }}
          TZ: Asia/Bangkok
        run: python scripts/fastmoss_camel_report.py

      - name: Save generated report and EchoTik data
        run: |
          if [ -n "$(git status --porcelain reports data/echotik_latest.csv data/echotik_latest.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add reports/ data/echotik_latest.csv data/echotik_latest.json
            git commit -m "Update CAMEL FastMoss and EchoTik report"
            git push
          else
            echo "No report changes to commit."
          fi
