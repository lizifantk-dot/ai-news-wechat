name: Daily CAMEL FastMoss Brief

on:
  schedule:
    # 09:47 Asia/Bangkok = 02:47 UTC
    - cron: "47 2 * * *"
  workflow_dispatch:

jobs:
  send-camel-brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate FastMoss report and push
        env:
          FASTMOSS_COOKIE: ${{ secrets.FASTMOSS_COOKIE }}
          SERVERCHAN_BOSS_SENDKEY: ${{ secrets.SERVERCHAN_BOSS_SENDKEY }}
          TZ: Asia/Bangkok
        run: python scripts/fastmoss_camel_report.py

      - name: Save generated report
        run: |
          if [ -n "$(git status --porcelain reports)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add reports/
            git commit -m "Update CAMEL FastMoss report"
            git push
          else
            echo "No report changes to commit."
          fi
